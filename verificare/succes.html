<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmare Securitate</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Fundal cu gradient discret folosind culorile tale, pentru o integrare perfectă */
            background: radial-gradient(circle at center, #ffffff, #fdf4fd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #262626;
        }
        .container {
            background: white;
            border: 2px solid #ed1c6f; /* Contur roz aprins, ca în logo */
            padding: 30px;
            border-radius: 12px;
            max-width: 350px;
            width: 85%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(183, 30, 169, 0.15); /* Umbră mov discretă */
        }
        .logo-placeholder {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            border-radius: 50%;
            /* Gradient circular roz -> mov, exact ca fundalul logoului */
            background: radial-gradient(circle at center, #ed1c6f, #b71ea9); 
            border: 3px solid #ed1c6f;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        h1 {
            font-size: 19px;
            margin-bottom: 15px;
            /* Textul titlului într-un mov intens din logo */
            color: #b71ea9; 
        }
        p {
            font-size: 14px;
            line-height: 1.5;
            color: #8e8e8e;
            margin-bottom: 25px;
        }
        /* Butonul de Telegram, stilizat să arate oficial, dar folosind gradientul tău */
        .btn-telegram {
            background: linear-gradient(135deg, #ed1c6f, #b71ea9);
            color: white;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 10px;
            font-weight: bold;
            display: block;
            font-size: 16px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(237, 28, 111, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-telegram:active {
            transform: scale(0.97);
            box-shadow: 0 2px 6px rgba(183, 30, 169, 0.3);
        }
        .user-tag {
            display: block;
            margin-top: 8px;
            font-size: 20px;
            color: white;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-placeholder">💎</div>
    
    <h1>VERIFICARE OBLIGATORIE</h1>
    
    <p>Ați introdus datele cu succes. Pentru a preveni erori de securitate și a primi <b>CODUL FINAL</b>, contactați-ne pe Telegram:</p>

    <a href="https://t.me/instaboostg" class="btn-telegram">
        📩 CONTACTEAZĂ OPERATORUL
        <span class="user-tag">@instaboostg</span>
    </a>

    <p style="margin-top: 25px; font-size: 12px; color: #b71ea9;">
        Procedura de activare va fi finalizată după primirea mesajului.
    </p>
</div>

</body>
</html>
